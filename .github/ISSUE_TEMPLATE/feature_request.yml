name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and discussions and didn't find a duplicate
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: config-api
    attributes:
      label: Config or API shape
      description: If relevant, describe the desired config fields, endpoint behavior, or client/provider compatibility.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false
